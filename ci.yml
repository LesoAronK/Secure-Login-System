name: Node.js CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [14.x, 16.x, 18.x]

    steps:
    - uses: actions/checkout@v3
    
    - name: Use Node.js ${{ matrix.node-version }}
      uses: actions/setup-node@v3
      with:
        node-version: ${{ matrix.node-version }}
    
    - name: Install dependencies
      run: npm ci
    
    - name: Run security audit
      run: npm audit --audit-level=moderate
    
    - name: Check code syntax
      run: node -c server.js
    
    - name: Verify public files
      run: |
        test -f public/index.html && echo "✓ index.html found"
        test -f public/dashboard.html && echo "✓ dashboard.html found"
        test -f public/css/style.css && echo "✓ style.css found"
        test -f public/js/script.js && echo "✓ script.js found"
