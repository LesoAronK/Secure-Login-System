<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Login System</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="container">
        <!-- Background decorative elements -->
        <div class="blob blob-top"></div>
        <div class="blob blob-bottom"></div>

        <div class="form-wrapper">
            <!-- Login Form -->
            <div class="form-container" id="loginForm">
                <div class="form-header">
                    <h1>Welcome Back</h1>
                    <p>Login to your secure account</p>
                </div>

                <form id="loginFormElement">
                    <div class="form-group">
                        <label for="loginUsername">Username</label>
                        <input 
                            type="text" 
                            id="loginUsername" 
                            name="username" 
                            placeholder="Enter your username"
                            required
                        >
                        <span class="error-message" id="loginUsernameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="loginPassword">Password</label>
                        <div class="password-input">
                            <input 
                                type="password" 
                                id="loginPassword" 
                                name="password" 
                                placeholder="Enter your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('loginPassword')">
                                <span class="icon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="loginPasswordError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Login</button>
                    <span class="error-message" id="loginError"></span>
                    <span class="success-message" id="loginSuccess"></span>
                </form>

                <div class="form-footer">
                    <p>Don't have an account? <a href="#" onclick="toggleForms()">Register here</a></p>
                </div>
            </div>

            <!-- Register Form -->
            <div class="form-container hidden" id="registerForm">
                <div class="form-header">
                    <h1>Create Account</h1>
                    <p>Join us today - it's free and secure</p>
                </div>

                <form id="registerFormElement">
                    <div class="form-group">
                        <label for="registerUsername">Username</label>
                        <input 
                            type="text" 
                            id="registerUsername" 
                            name="username" 
                            placeholder="3-20 characters (alphanumeric, -, _)"
                            required
                        >
                        <span class="error-message" id="registerUsernameError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerEmail">Email</label>
                        <input 
                            type="email" 
                            id="registerEmail" 
                            name="email" 
                            placeholder="Enter your email"
                            required
                        >
                        <span class="error-message" id="registerEmailError"></span>
                    </div>

                    <div class="form-group">
                        <label for="registerPassword">Password</label>
                        <div class="password-input">
                            <input 
                                type="password" 
                                id="registerPassword" 
                                name="password" 
                                placeholder="At least 8 characters"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('registerPassword')">
                                <span class="icon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="registerPasswordError"></span>
                    </div>

                    <div class="form-group">
                        <label for="confirmPassword">Confirm Password</label>
                        <div class="password-input">
                            <input 
                                type="password" 
                                id="confirmPassword" 
                                name="confirmPassword" 
                                placeholder="Confirm your password"
                                required
                            >
                            <button type="button" class="toggle-password" onclick="togglePassword('confirmPassword')">
                                <span class="icon">👁️</span>
                            </button>
                        </div>
                        <span class="error-message" id="confirmPasswordError"></span>
                    </div>

                    <button type="submit" class="btn btn-primary">Create Account</button>
                    <span class="error-message" id="registerError"></span>
                    <span class="success-message" id="registerSuccess"></span>
                </form>

                <div class="form-footer">
                    <p>Already have an account? <a href="#" onclick="toggleForms()">Login here</a></p>
                </div>
            </div>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
