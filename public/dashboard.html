<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Secure Login System</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/dashboard.css">
</head>
<body>
    <div class="dashboard-container">
        <!-- Navigation -->
        <nav class="navbar">
            <div class="navbar-brand">
                <h2>SecureAuth</h2>
            </div>
            <div class="navbar-menu">
                <button class="btn btn-logout" onclick="logout()">Logout</button>
            </div>
        </nav>

        <!-- Main Content -->
        <div class="dashboard-content">
            <div class="welcome-section">
                <div class="welcome-card">
                    <div class="card-icon">👋</div>
                    <h1>Welcome, <span id="username"></span>!</h1>
                    <p>You have successfully logged in to your secure account</p>
                </div>
            </div>

            <!-- User Info Section -->
            <div class="info-grid">
                <div class="info-card">
                    <div class="card-header">
                        <h3>Account Information</h3>
                        <span class="card-icon">👤</span>
                    </div>
                    <div class="card-body">
                        <div class="info-item">
                            <label>Username</label>
                            <p id="displayUsername"></p>
                        </div>
                        <div class="info-item">
                            <label>Email</label>
                            <p id="displayEmail"></p>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <div class="card-header">
                        <h3>Security Status</h3>
                        <span class="card-icon">🔒</span>
                    </div>
                    <div class="card-body">
                        <div class="security-badge">
                            <span class="badge-icon">✓</span>
                            <span class="badge-text">Password Protected</span>
                        </div>
                        <div class="security-badge">
                            <span class="badge-icon">✓</span>
                            <span class="badge-text">Session Active</span>
                        </div>
                    </div>
                </div>

                <div class="info-card">
                    <div class="card-header">
                        <h3>System Features</h3>
                        <span class="card-icon">⚙️</span>
                    </div>
                    <div class="card-body">
                        <div class="feature-item">
                            <span class="feature-icon">🔐</span>
                            <span>Bcrypt Password Hashing</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">🛡️</span>
                            <span>SQL Injection Protection</span>
                        </div>
                        <div class="feature-item">
                            <span class="feature-icon">⏱️</span>
                            <span>Session Management</span>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Quick Actions -->
            <div class="actions-section">
                <button class="action-btn" onclick="copyInfo()">
                    <span>📋</span>
                    Copy Account Info
                </button>
                <button class="action-btn" onclick="showAlert()">
                    <span>ℹ️</span>
                    System Info
                </button>
            </div>

            <!-- Error Message -->
            <div class="error-banner" id="errorBanner">
                <span id="errorMessage"></span>
            </div>
        </div>
    </div>

    <script src="js/dashboard.js"></script>
</body>
</html>
